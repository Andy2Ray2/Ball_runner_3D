<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Glass Ball 3D</title>
<style>
  body { margin: 0; overflow: hidden; background: #050510; touch-action: none; font-family: 'Arial', sans-serif; }
  canvas { display: block; width: 100%; height: 100vh; }
  
  #ui {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #score {
    margin-top: 20px; 
    font-size: 5rem;
    color: #fff;
    font-weight: bold;
    text-shadow: 0 0 20px #00ffff;
    z-index: 10;
  }

  #menu {
    position: absolute;
    top: 65%; 
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    background: rgba(0, 0, 0, 0.9);
    padding: 30px;
    border-radius: 30px;
    border: 2px solid #00ffff;
    pointer-events: auto;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
    max-width: 90%;
    width: 340px;
  }

  h1 { 
    color: #00ffff; 
    margin: 0 0 15px 0; 
    font-size: 1.8rem;
    text-transform: uppercase; 
    letter-spacing: 2px;
    text-shadow: 0 0 10px #00ffff;
    line-height: 1.2;
  }
  
  p { color: #ccc; margin-bottom: 20px; font-size: 1rem; line-height: 1.4; }
  
  .controls-info {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 25px;
    flex-wrap: wrap;
  }
  
  .control-box {
    background: rgba(255,255,255,0.1);
    padding: 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    color: #fff;
    min-width: 130px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  button {
    background: linear-gradient(45deg, #00ffff, #0088ff);
    color: #000;
    border: none;
    padding: 18px 50px;
    font-size: 1.4rem;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
    transition: transform 0.1s;
    width: 100%;
  }
  button:active { transform: scale(0.95); }

  .hidden { display: none !important; }
  
  .win-text {
    color: #ffd700 !important;
    text-shadow: 0 0 20px #ffd700 !important;
    font-size: 2rem !important;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="score">0</div>
</div>

<div id="menu">
  <h1 id="menuTitle">GLASS RUN 3D</h1>
  <div class="controls-info" id="controlsInfo">
    <div class="control-box">📱 Тап СВЕРХУ<br>= ПРЫЖОК ⬆️</div>
    <div class="control-box">📱 Тап СНИЗУ<br>= ПОВОРОТ ↔️</div>
    <div class="control-box">💻 W / Стрелка ВВЕРХ<br>= ПРЫЖОК ⬆️</div>
    <div class="control-box">💻 A/D / Стрелки<br>= ПОВОРОТ ↔️</div>
  </div>
  <p id="menuText">Правило: После желтого барьера идут 2 красные стены!</p>
  <button id="startBtn">ПОЕХАЛИ 🚀</button>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  // --- НАСТРОЙКА СЦЕНЫ ---
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050510);
  scene.fog = new THREE.FogExp2(0x050510, 0.02);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 4, 7);
  camera.lookAt(0, 0, -5);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // --- СВЕТ ---
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 5);
  dirLight.castShadow = true;
  scene.add(dirLight);

  // --- ИГРОК (ШАРИК) ---
  const ballGeo = new THREE.SphereGeometry(0.5, 32, 32);
  const ballMat = new THREE.MeshStandardMaterial({ 
    color: 0x00ffff,
    emissive: 0x0044aa,
    emissiveIntensity: 0.5,
    roughness: 0.1,
    metalness: 0.5
  });
  const player = new THREE.Mesh(ballGeo, ballMat);
  player.castShadow = true;
  player.position.y = 0.5;
  scene.add(player);

  // Тень
  const shadowGeo = new THREE.CircleGeometry(0.4, 32);
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.5 });
  const shadow = new THREE.Mesh(shadowGeo, shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.y = 0.01;
  scene.add(shadow);

  // --- ТРАССА ---
  const gridHelper = new THREE.GridHelper(200, 100, 0xff00ff, 0x222244);
  gridHelper.position.y = 0;
  scene.add(gridHelper);

  const floorGeo = new THREE.PlaneGeometry(200, 200);
  const floorMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -0.1;
  scene.add(floor);

  // --- ПРЕПЯТСТВИЯ ---
  let obstacles = [];
  
  // Материалы
  const wallMatGlass = new THREE.MeshPhysicalMaterial({ 
    color: 0xff0055, transmission: 0.6, thickness: 1.0, transparent: true, opacity: 0.7,
    emissive: 0xaa0022, emissiveIntensity: 0.2
  });
  
  const barrierMatGlass = new THREE.MeshPhysicalMaterial({ 
    color: 0xffaa00, transmission: 0.6, thickness: 1.0, transparent: true, opacity: 0.7,
    emissive: 0xaa5500, emissiveIntensity: 0.2
  });

  const wallGeo = new THREE.BoxGeometry(1.2, 8, 1); 
  const barrierGeo = new THREE.BoxGeometry(5, 0.6, 0.5);

  // Логика очереди препятствий
  let nextIsWallCount = 0; // Сколько стен осталось создать принудительно

  function spawnObstacle() {
    let obs;
    let typeToSpawn = '';

    // Если есть очередь стен (после желтого барьера)
    if (nextIsWallCount > 0) {
      typeToSpawn = 'wall';
      nextIsWallCount--;
    } else {
      // Случайный выбор
      if (Math.random() > 0.4) {
        typeToSpawn = 'wall';
      } else {
        typeToSpawn = 'barrier';
        // Если выпал барьер, ставим в очередь 2 стены
        nextIsWallCount = 2;
      }
    }

    if (typeToSpawn === 'wall') {
      obs = new THREE.Mesh(wallGeo, wallMatGlass);
      const lanes = [-1.5, 0, 1.5];
      const lane = lanes[Math.floor(Math.random() * lanes.length)];
      obs.position.set(lane, 4, -60);
      obs.userData = { type: 'wall' };
    } else {
      obs = new THREE.Mesh(barrierGeo, barrierMatGlass);
      obs.position.set(0, 0.3, -60);
      obs.userData = { type: 'barrier' };
    }

    obs.castShadow = true;
    scene.add(obs);
    obstacles.push(obs);
  }

  // --- ЧАСТИЦЫ ---
  const starsGeo = new THREE.BufferGeometry();
  const starsCount = 300;
  const posArray = new Float32Array(starsCount * 3);
  for(let i=0; i<starsCount*3; i++) {
    posArray[i] = (Math.random() - 0.5) * 50;
  }
  starsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
  const starsMat = new THREE.PointsMaterial({size: 0.1, color: 0xffffff});
  const starMesh = new THREE.Points(starsGeo, starsMat);
  scene.add(starMesh);

  // --- ЛОГИКА ИГРЫ ---
  let gameActive = false;
  let score = 0;
  let speed = 0.5;
  let currentLane = 0;
  
  let playerY = 0.5;
  let velocityY = 0;
  const gravity = 0.025;
  const jumpForce = 0.48;
  let isJumping = false;

  // Таймер спавна
  let spawnTimer = 0;
  let nextSpawnTime = 0;

  const laneWidth = 1.5;
  const WIN_SCORE = 100;

  const scoreEl = document.getElementById('score');
  const menuEl = document.getElementById('menu');
  const startBtn = document.getElementById('startBtn');
  const menuTitle = document.getElementById('menuTitle');
  const menuText = document.getElementById('menuText');

  // --- УПРАВЛЕНИЕ ---

  function moveLane(dir) {
    if (!gameActive) return;
    currentLane += dir;
    if (currentLane < -1) currentLane = -1;
    if (currentLane > 1) currentLane = 1;
  }

  function jump() {
    if (!gameActive) return;
    if (!isJumping) {
      velocityY = jumpForce;
      isJumping = true;
    }
  }

  window.addEventListener('touchstart', (e) => {
    if (!gameActive) return;
    e.preventDefault(); 
    const touchY = e.touches[0].clientY;
    const touchX = e.touches[0].clientX;
    if (touchY < window.innerHeight / 2) jump();
    else {
      if (touchX < window.innerWidth / 2) moveLane(-1);
      else moveLane(1);
    }
  }, { passive: false });

  window.addEventListener('keydown', (e) => {
    if (!gameActive) {
        if(e.code === 'Enter' || e.code === 'Space') startGame();
        return;
    }
    switch(e.code) {
      case 'ArrowUp': case 'KeyW': jump(); break;
      case 'ArrowLeft': case 'KeyA': moveLane(-1); break;
      case 'ArrowRight': case 'KeyD': moveLane(1); break;
    }
  });

  window.addEventListener('mousedown', (e) => {
    if (!gameActive || e.target.tagName === 'BUTTON') return;
    if (e.clientY < window.innerHeight / 2) jump();
    else {
      if (e.clientX < window.innerWidth / 2) moveLane(-1);
      else moveLane(1);
    }
  });

  startBtn.addEventListener('click', startGame);

  function startGame() {
    gameActive = true;
    score = 0;
    speed = 0.5;
    currentLane = 0;
    playerY = 0.5;
    velocityY = 0;
    isJumping = false;
    spawnTimer = 0;
    nextIsWallCount = 0; // Сброс очереди
    setNextSpawn();
    
    scoreEl.innerText = '0';
    menuEl.classList.add('hidden');
    
    obstacles.forEach(o => scene.remove(o));
    obstacles = [];
  }

  function setNextSpawn() {
    // Расстояние зависит от скорости
    const baseDist = 30 + (speed * 20); 
    nextSpawnTime = baseDist + (Math.random() * 20 - 10);
  }

  function gameOver(win) {
    gameActive = false;
    menuEl.classList.remove('hidden');
    
    if (win) {
      menuTitle.innerHTML = "🎉 ПОБЕДА! 🎉";
      menuTitle.className = "win-text";
      menuText.innerHTML = "<b>Ты не слон в посудной лавке!</b><br>Идеальный результат.";
      startBtn.innerText = "СЫГРАТЬ ЕЩЁ";
    } else {
      menuTitle.innerText = "💥 СТЕКЛО РАЗБИЛОСЬ!";
      menuTitle.className = "";
      menuText.innerHTML = `Счёт: <span style="color:#fff;font-weight:bold">${score}</span> из ${WIN_SCORE}`;
      startBtn.innerText = "ПОПРОБОВАТЬ СНОВА";
    }
  }

  // --- ГЛАВНЫЙ ЦИКЛ ---
  function animate() {
    requestAnimationFrame(animate);

    if (gameActive) {
      // Физика игрока
      const targetX = currentLane * laneWidth;
      player.position.x += (targetX - player.position.x) * 0.15;
      
      if (isJumping) {
        playerY += velocityY;
        velocityY -= gravity;
        if (playerY <= 0.5) {
          playerY = 0.5;
          isJumping = false;
          velocityY = 0;
        }
      }
      player.position.y = playerY;

      // Тень
      shadow.position.x = player.position.x;
      const shadowScale = 1 - (playerY - 0.5) * 0.5;
      shadow.scale.set(shadowScale, shadowScale, 1);

      // Вращение
      player.rotation.x -= 0.2; 

      // Движение мира
      gridHelper.position.z += speed;
      if (gridHelper.position.z > 2) gridHelper.position.z = 0;

      // --- СПАВН ---
      spawnTimer += speed;
      if (spawnTimer > nextSpawnTime) {
        spawnObstacle();
        spawnTimer = 0;
        setNextSpawn();
      }

      // Обновление препятствий
      for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.position.z += speed;

        // Столкновение
        if (obs.position.z > -1 && obs.position.z < 1) {
          if (obs.userData.type === 'wall') {
            if (Math.abs(obs.position.x - player.position.x) < 0.9) {
              gameOver(false); return;
            }
          }
          else if (obs.userData.type === 'barrier') {
            if (playerY < 1.1) {
              gameOver(false); return;
            }
          }
        }

        // Удаление и счет
        if (obs.position.z > 5) {
          scene.remove(obs);
          obstacles.splice(i, 1);
          score++;
          scoreEl.innerText = score;
          
          if (score >= WIN_SCORE) {
            gameOver(true); return;
          }
          
          if (score % 5 === 0) speed += 0.02;
        }
      }
      
      starMesh.rotation.z += 0.002;
    }

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
</script>
</body>
</html>
